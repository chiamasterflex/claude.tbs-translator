<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>TBS Live Translator V2</title>
  <style>
    body { font-family: sans-serif; padding: 20px; }
    textarea { width: 48%; height: 300px; }
  </style>
</head>
<body>

<h1>TBS Live Translator V2</h1>

<button id="start">Start</button>
<button id="stop">Stop</button>

<p>Status: <span id="status">idle</span></p>

<div>
  <textarea id="cn" placeholder="Chinese"></textarea>
  <textarea id="en" placeholder="English"></textarea>
</div>

<script>
console.log("INDEX V2 LOADED");

let ws;
let audioContext;
let processor;
let source;
let stream;

const statusEl = document.getElementById("status");
const cnEl = document.getElementById("cn");
const enEl = document.getElementById("en");

function setStatus(s) {
  statusEl.textContent = s;
  console.log("[STATUS]", s);
}

function wsUrl() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  return proto + '//' + location.host + '/ws';
}

function downsample(buffer, inputRate, outputRate) {
  const ratio = inputRate / outputRate;
  const newLen = Math.round(buffer.length / ratio);
  const result = new Float32Array(newLen);

  let offsetResult = 0;
  let offsetBuffer = 0;

  while (offsetResult < result.length) {
    const nextOffsetBuffer = Math.round((offsetResult + 1) * ratio);
    let sum = 0, count = 0;

    for (let i = offsetBuffer; i < nextOffsetBuffer && i < buffer.length; i++) {
      sum += buffer[i];
      count++;
    }

    result[offsetResult] = sum / count;
    offsetResult++;
    offsetBuffer = nextOffsetBuffer;
  }

  return result;
}

function floatToPCM16(float32) {
  const buffer = new ArrayBuffer(float32.length * 2);
  const view = new DataView(buffer);

  let offset = 0;
  for (let i = 0; i < float32.length; i++, offset += 2) {
    let s = Math.max(-1, Math.min(1, float32[i]));
    view.setInt16(offset, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
  }

  return buffer;
}

async function start() {
  console.log("START CLICKED");

  ws = new WebSocket(wsUrl());
  ws.binaryType = "arraybuffer";

  ws.onopen = async () => {
    console.log("[WS] open");
    setStatus("connected");

    stream = await navigator.mediaDevices.getUserMedia({ audio: true });

    audioContext = new AudioContext();
    source = audioContext.createMediaStreamSource(stream);

    processor = audioContext.createScriptProcessor(4096, 1, 1);

    processor.onaudioprocess = (e) => {
      const input = e.inputBuffer.getChannelData(0);

      const down = downsample(input, audioContext.sampleRate, 16000);
      const pcm = floatToPCM16(down);

      if (ws.readyState === 1) {
        ws.send(pcm);
        console.log("[AUDIO] sent", pcm.byteLength);
      }
    };

    source.connect(processor);
    processor.connect(audioContext.destination);

    setStatus("streaming");
  };

  ws.onmessage = (msg) => {
    try {
      const data = JSON.parse(msg.data);

      if (data.type === "live_cn") {
        cnEl.value = data.text;
      }

      if (data.type === "final") {
        cnEl.value += "\n" + data.cn;
        enEl.value += "\n" + data.en;
      }
    } catch {}
  };

  ws.onclose = () => {
    console.log("[WS] closed");
    setStatus("closed");
  };

  ws.onerror = (e) => {
    console.log("[WS] error", e);
  };
}

function stop() {
  console.log("STOP CLICKED");

  if (processor) processor.disconnect();
  if (source) source.disconnect();
  if (audioContext) audioContext.close();
  if (stream) stream.getTracks().forEach(t => t.stop());
  if (ws) ws.close();

  setStatus("stopped");
}

document.getElementById("start").onclick = start;
document.getElementById("stop").onclick = stop;
</script>

</body>
</html>
