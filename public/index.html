<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>TBS Translator</title>
</head>
<body>

<button onclick="start()">Start</button>
<button onclick="stop()">Stop</button>

<p id="status">idle</p>

<textarea id="cn" style="width:45%;height:300px"></textarea>
<textarea id="en" style="width:45%;height:300px"></textarea>

<script>
let ws;
let audioCtx;
let processor;
let source;
let stream;
let running = false;

function setStatus(s) {
  document.getElementById('status').innerText = s;
  console.log('[STATUS]', s);
}

function wsUrl() {
  return (location.protocol === 'https:' ? 'wss://' : 'ws://') + location.host + '/ws';
}

function start() {
  if (running) return;
  running = true;

  ws = new WebSocket(wsUrl());
  ws.binaryType = 'arraybuffer';

  ws.onopen = async () => {
    console.log('[WS] open');
    setStatus('connected');

    stream = await navigator.mediaDevices.getUserMedia({ audio: true });

    audioCtx = new AudioContext();
    source = audioCtx.createMediaStreamSource(stream);

    processor = audioCtx.createScriptProcessor(4096, 1, 1);

    processor.onaudioprocess = (e) => {
      if (!ws || ws.readyState !== 1) return;

      const input = e.inputBuffer.getChannelData(0);

      const pcm = new Int16Array(input.length);
      for (let i = 0; i < input.length; i++) {
        pcm[i] = Math.max(-1, Math.min(1, input[i])) * 32767;
      }

      ws.send(pcm.buffer);
    };

    source.connect(processor);
    processor.connect(audioCtx.destination);

    setStatus('streaming');
  };

  ws.onmessage = (e) => {
    const msg = JSON.parse(e.data);

    if (msg.type === 'live_cn') {
      document.getElementById('cn').value = msg.text;
    }

    if (msg.type === 'final') {
      document.getElementById('cn').value += msg.cn + '\n';
      document.getElementById('en').value += msg.en + '\n';
    }
  };

  ws.onclose = () => {
    console.log('[WS] closed');
    setStatus('closed');
  };
}

function stop() {
  running = false;

  if (processor) processor.disconnect();
  if (source) source.disconnect();

  if (stream) {
    stream.getTracks().forEach(t => t.stop());
  }

  if (audioCtx) audioCtx.close();

  // 🔥 DO NOT AUTO CLOSE unless manually stopping
  if (ws) ws.close();

  setStatus('stopped');
}
</script>

</body>
</html>
