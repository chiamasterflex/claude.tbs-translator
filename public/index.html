<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>TBS Live Translator</title>
  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial; margin: 20px; }
    .row { display: flex; gap: 16px; }
    .col { flex: 1; }
    textarea { width: 100%; height: 260px; }
    button { padding: 10px 14px; margin-right: 8px; }
    .status { margin: 10px 0; opacity: 0.8; }
    .pill { display: inline-block; padding: 2px 8px; border-radius: 999px; background: #eee; }
    code { background: #f4f4f4; padding: 1px 4px; border-radius: 4px; }
  </style>
</head>
<body>
  <h1>TBS Live Translator</h1>

  <div>
    <button id="btnStart">Start</button>
    <button id="btnStop" disabled>Stop</button>
    <span class="status">Status: <span id="status" class="pill">idle</span></span>
  </div>

  <div class="row">
    <div class="col">
      <h3>Live Chinese</h3>
      <textarea id="cn" readonly></textarea>
    </div>
    <div class="col">
      <h3>English</h3>
      <textarea id="en" readonly></textarea>
    </div>
  </div>

  <script>
    const statusEl = document.getElementById('status');
    const cnEl = document.getElementById('cn');
    const enEl = document.getElementById('en');
    const btnStart = document.getElementById('btnStart');
    const btnStop = document.getElementById('btnStop');

    let ws, audioCtx, micStream, sourceNode, workletNode;

    function setStatus(s) { statusEl.textContent = s; }

    function wsUrl() {
      const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
      return `${proto}//${location.host}/ws`;
    }

    function appendLine(el, text) {
      el.value = (el.value + (el.value ? '\n' : '') + text).slice(-20000);
      el.scrollTop = el.scrollHeight;
    }

    async function start() {
      btnStart.disabled = true;
      btnStop.disabled = false;
      setStatus('connecting');

      ws = new WebSocket(wsUrl());
      ws.binaryType = 'arraybuffer';

      ws.onopen = async () => {
        setStatus('ws_open');
        await startAudio();
      };

      ws.onmessage = (ev) => {
        try {
          const msg = JSON.parse(ev.data);
          if (msg.type === 'status') setStatus(msg.status);
          if (msg.type === 'live_cn') cnEl.value = msg.text;
          if (msg.type === 'final') {
            appendLine(cnEl, msg.cn);
            appendLine(enEl, msg.en);
          }
          if (msg.type === 'error') setStatus('error: ' + msg.message);
        } catch (_) {
          // ignore
        }
      };

      ws.onclose = () => setStatus('ws_closed');
      ws.onerror = () => setStatus('ws_error');
    }

    async function stop() {
      btnStart.disabled = false;
      btnStop.disabled = true;

      try { workletNode?.disconnect(); } catch (_) {}
      try { sourceNode?.disconnect(); } catch (_) {}
      try { micStream?.getTracks()?.forEach(t => t.stop()); } catch (_) {}
      try { await audioCtx?.close(); } catch (_) {}
      audioCtx = null; micStream = null; sourceNode = null; workletNode = null;

      try { ws?.close(); } catch (_) {}
      ws = null;

      setStatus('idle');
    }

    btnStart.onclick = start;
    btnStop.onclick = stop;

    async function startAudio() {
      setStatus('mic_permission');

      micStream = await navigator.mediaDevices.getUserMedia({
        audio: {
          channelCount: 1,
          echoCancellation: true,
          noiseSuppression: true,
          autoGainControl: true
        }
      });

      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      setStatus(`audio_ctx_${audioCtx.sampleRate}hz`);

      // Create an AudioWorklet on the fly (no extra file needed)
      const workletCode = `
        class Pcm16Downsampler extends AudioWorkletProcessor {
          constructor() {
            super();
            this.inRate = sampleRate;
            this.outRate = 16000;
            this.ratio = this.inRate / this.outRate;
            this._carry = 0;
            this._last = 0;
          }

          // Convert float [-1,1] to int16
          _f2i16(x) {
            x = Math.max(-1, Math.min(1, x));
            return x < 0 ? x * 0x8000 : x * 0x7FFF;
          }

          process(inputs) {
            const input = inputs[0];
            if (!input || !input[0] || input[0].length === 0) return true;

            const ch = input[0]; // mono
            const outSamples = [];
            let idx = 0;

            // Simple downsample by linear interpolation (good enough for ASR)
            while (idx < ch.length) {
              const t = this._carry;
              const i0 = Math.floor(t);
              const i1 = Math.min(i0 + 1, ch.length - 1);

              // if we don't have enough data for interpolation, break
              if (i0 >= ch.length) break;

              const frac = t - i0;
              const s = ch[i0] + (ch[i1] - ch[i0]) * frac;
              outSamples.push(s);

              this._carry += this.ratio;
              idx = Math.floor(this._carry);
              // keep carry bounded so it doesn't explode
              if (this._carry > 1e9) this._carry = idx;
              if (idx >= ch.length) {
                this._carry -= ch.length;
                break;
              }
            }

            // Pack to PCM16 LE
            const buf = new ArrayBuffer(outSamples.length * 2);
            const view = new DataView(buf);
            for (let i = 0; i < outSamples.length; i++) {
              view.setInt16(i * 2, this._f2i16(outSamples[i]), true);
            }

            this.port.postMessage(buf, [buf]);
            return true;
          }
        }
        registerProcessor('pcm16-downsampler', Pcm16Downsampler);
      `;

      const blob = new Blob([workletCode], { type: 'application/javascript' });
      const url = URL.createObjectURL(blob);
      await audioCtx.audioWorklet.addModule(url);
      URL.revokeObjectURL(url);

      sourceNode = audioCtx.createMediaStreamSource(micStream);
      workletNode = new AudioWorkletNode(audioCtx, 'pcm16-downsampler');

      workletNode.port.onmessage = (ev) => {
        if (!ws || ws.readyState !== WebSocket.OPEN) return;
        // ev.data is an ArrayBuffer of PCM16@16k
        ws.send(ev.data);
      };

      // connect (worklet doesn't need to go to destination)
      sourceNode.connect(workletNode);

      setStatus('streaming_pcm16_16k');
    }
  </script>
</body>
</html>
