<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>TBS Live Translator</title>
  <style>
    body { font-family: system-ui; margin: 20px; }
    .row { display: flex; gap: 16px; }
    .col { flex: 1; }
    textarea { width: 100%; height: 260px; }
    button { padding: 10px 14px; margin-right: 8px; }
  </style>
</head>
<body>

<h2>TBS Live Translator</h2>

<button id="start">Start</button>
<button id="stop" disabled>Stop</button>

<p>Status: <span id="status">idle</span></p>

<div class="row">
  <div class="col">
    <h3>Chinese</h3>
    <textarea id="cn"></textarea>
  </div>
  <div class="col">
    <h3>English</h3>
    <textarea id="en"></textarea>
  </div>
</div>

<script>
let ws;
let audioCtx;
let processor;
let source;
let stream;

const statusEl = document.getElementById('status');
const cnEl = document.getElementById('cn');
const enEl = document.getElementById('en');

function setStatus(s) {
  statusEl.textContent = s;
  console.log('[STATUS]', s);
}

function wsUrl() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  return proto + '//' + location.host + '/ws';
}

function append(el, text) {
  el.value += text + '\n';
  el.scrollTop = el.scrollHeight;
}

function downsample(buffer, inRate, outRate) {
  if (inRate === outRate) return buffer;

  const ratio = inRate / outRate;
  const newLen = Math.round(buffer.length / ratio);
  const result = new Float32Array(newLen);

  let offset = 0;

  for (let i = 0; i < newLen; i++) {
    const next = Math.round((i + 1) * ratio);
    let sum = 0;
    let count = 0;

    for (let j = offset; j < next && j < buffer.length; j++) {
      sum += buffer[j];
      count++;
    }

    result[i] = sum / count;
    offset = next;
  }

  return result;
}

function toPCM(float32) {
  const buf = new ArrayBuffer(float32.length * 2);
  const view = new DataView(buf);

  let i = 0;
  for (let j = 0; j < float32.length; j++, i += 2) {
    let s = Math.max(-1, Math.min(1, float32[j]));
    view.setInt16(i, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
  }

  return buf;
}

document.getElementById('start').onclick = async () => {
  setStatus('connecting');

  ws = new WebSocket(wsUrl());
  ws.binaryType = 'arraybuffer';

  ws.onopen = async () => {
    console.log('[WS] open');
    setStatus('mic');

    stream = await navigator.mediaDevices.getUserMedia({ audio: true });

    audioCtx = new AudioContext();
    source = audioCtx.createMediaStreamSource(stream);

    processor = audioCtx.createScriptProcessor(4096, 1, 1);

    processor.onaudioprocess = (e) => {
      if (!ws || ws.readyState !== WebSocket.OPEN) return;

      const input = e.inputBuffer.getChannelData(0);
      const down = downsample(input, audioCtx.sampleRate, 16000);
      const pcm = toPCM(down);

      if (pcm.byteLength < 1000) return;

      ws.send(pcm);
      console.log('[SEND]', pcm.byteLength);
    };

    source.connect(processor);
    processor.connect(audioCtx.destination);

    setStatus('streaming');
  };

  ws.onmessage = (e) => {
    const msg = JSON.parse(e.data);

    if (msg.type === 'live_cn') {
      cnEl.value = msg.text;
    }

    if (msg.type === 'final') {
      append(cnEl, msg.cn);
      append(enEl, msg.en);
    }

    if (msg.type === 'status') {
      setStatus(msg.status);
    }
  };

  ws.onclose = () => {
    console.log('[WS] closed');
    setStatus('closed');
  };

  ws.onerror = (err) => {
    console.error(err);
    setStatus('error');
  };

  document.getElementById('start').disabled = true;
  document.getElementById('stop').disabled = false;
};

document.getElementById('stop').onclick = async () => {
  setStatus('stopping');

  if (processor) processor.disconnect();
  if (source) source.disconnect();

  if (stream) {
    stream.getTracks().forEach(t => t.stop());
  }

  if (audioCtx) await audioCtx.close();

  if (ws) ws.close();

  setStatus('idle');

  document.getElementById('start').disabled = false;
  document.getElementById('stop').disabled = true;
};
</script>

</body>
</html>
